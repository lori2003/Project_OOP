# Configurazione di java.util.logging caricata da TravelBudgetCli.main()
# Mantiene la CLI pulita: solo WARNING/SEVERE in console, tutto in file.

handlers = java.util.logging.FileHandler, java.util.logging.ConsoleHandler

# Root logger: tutto su FILE, WARNING in console
.level = INFO

# File handler: cattura tutto da INFO in giù in travel-budget.log
java.util.logging.FileHandler.level = ALL
java.util.logging.FileHandler.pattern = travel-budget.log
java.util.logging.FileHandler.limit = 1048576
java.util.logging.FileHandler.count = 1
java.util.logging.FileHandler.append = true
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter

# Console handler: solo WARNING/SEVERE finiscono a video
java.util.logging.ConsoleHandler.level = WARNING
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Formato compatto, niente prefisso multiriga
java.util.logging.SimpleFormatter.format = [%1$tF %1$tT] %4$s %3$s - %5$s%n
